apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: chaosexperiments.chaos.jamespham.io
spec:
  group: chaos.jamespham.io
  names:
    kind: ChaosExperiment
    listKind: ChaosExperimentList
    plural: chaosexperiments
    singular: chaosexperiment
    shortNames: [ce]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required: [type, selector]
              properties:
                type:
                  type: string
                  enum: [pod-failure, network-latency, cpu-stress]
                selector:
                  type: object
                  properties:
                    matchLabels:
                      type: object
                      additionalProperties:
                        type: string
                schedule:
                  type: string
                  description: Cron schedule for recurring execution (empty = run once)
                podFailure:
                  type: object
                  properties:
                    percentage:
                      type: integer
                      minimum: 1
                      maximum: 100
                    gracePeriodSeconds:
                      type: integer
                      minimum: 0
                networkLatency:
                  type: object
                  properties:
                    latencyMs:
                      type: integer
                      minimum: 0
                    jitterMs:
                      type: integer
                      minimum: 0
                    durationSeconds:
                      type: integer
                      minimum: 1
                cpuStress:
                  type: object
                  properties:
                    workers:
                      type: integer
                      minimum: 1
                    durationSeconds:
                      type: integer
                      minimum: 1
                prometheus:
                  type: object
                  description: Where the operator reads steady-state and guard metrics
                  properties:
                    url:
                      type: string
                steadyStateHypothesis:
                  type: object
                  description: >
                    The claim that defines a healthy system. Verified before the
                    experiment (or it refuses to start) and after (or the run is
                    marked as not recovered).
                  required: [metric, query]
                  properties:
                    metric:
                      type: string
                    query:
                      type: string
                      description: Instant PromQL returning a single scalar
                    lower:
                      type: number
                      description: Lower bound of the acceptable band (omit for one-sided)
                    upper:
                      type: number
                      description: Upper bound of the acceptable band (omit for one-sided)
                    sampleSize:
                      type: integer
                      minimum: 3
                      default: 30
                    confidence:
                      type: number
                      default: 0.95
                safety:
                  type: object
                  description: Blast-radius guards that abort the experiment mid-run
                  required: [guards]
                  properties:
                    maxDurationSeconds:
                      type: integer
                      minimum: 1
                      default: 300
                    pollIntervalSeconds:
                      type: integer
                      minimum: 1
                      default: 5
                    guards:
                      type: array
                      items:
                        type: object
                        required: [name, query, threshold]
                        properties:
                          name:
                            type: string
                          query:
                            type: string
                          threshold:
                            type: number
                          comparison:
                            type: string
                            enum: [gt, lt]
                            default: gt
                          consecutiveBreachesToAbort:
                            type: integer
                            minimum: 1
                            default: 3
      additionalPrinterColumns:
        - name: Type
          type: string
          jsonPath: .spec.type
        - name: Schedule
          type: string
          jsonPath: .spec.schedule
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
