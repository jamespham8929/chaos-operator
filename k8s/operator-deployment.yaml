apiVersion: v1
kind: Namespace
metadata:
  name: chaos-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: chaos-operator
  namespace: chaos-system
  labels:
    app.kubernetes.io/name: chaos-operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: chaos-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: chaos-operator
    spec:
      serviceAccountName: chaos-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: ghcr.io/jamespham8929/chaos-operator:latest
          imagePullPolicy: IfNotPresent
          command: ["kopf", "run", "--standalone", "-m", "chaos_operator.operator"]
          env:
            - name: CHAOS_PROMETHEUS_URL
              value: http://prometheus-operated.monitoring:9090
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
